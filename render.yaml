services:
  - type: web
    name: sosovault-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SOSOVALUE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SODEX_PRIVATE_KEY
        sync: false
      - key: SODEX_ADDRESS
        sync: false
      - key: SODEX_ACCOUNT_ID
        sync: false
      - key: SODEX_BASE_URL
        value: https://testnet-gw.sodex.dev
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_RPM
        value: "60"
